name: Rebuild Approved PR

on:
  issue_comment:
    types: [created]

jobs:
  rebuild_approved_pr:
    runs-on: ubuntu-latest
    if: >
      github.event.comment.user.login == 'Gamebuster19901' &&
      github.event.comment.body == '@WilderForge rebuild' &&
      github.event.issue.pull_request != null
    steps:
      - name: Fetch Pull Request Details
        id: fetch_pr_details
        run: |
          PR_URL=$(jq -r '.pull_request.url' <<< '${{ toJson(github.event.issue) }}')

          echo "Fetching pull request details from: $PR_URL"

          PR_DETAILS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$PR_URL")
          PR_SHA=$(echo "$PR_DETAILS" | jq -r '.head.sha')

          echo "Pull Request SHA: $PR_SHA"
          echo "pr_sha=$PR_SHA" >> $GITHUB_ENV

      - name: Fetch Approved Status
        id: fetch_status
        run: |
          PR_SHA=${{ env.pr_sha }}
          CONTEXT="Approval Validation"

          echo "Fetching commit status for PR SHA: $PR_SHA in context: $CONTEXT"

          # Fetch commit status from GitHub API
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${PR_SHA}/status")

          CONTEXT_STATUS=$(echo "$RESPONSE" | jq -r --arg CONTEXT "$CONTEXT" \
            '.statuses[] | select(.context == $CONTEXT) | .state')
          APPROVED_SHA=$(echo "$RESPONSE" | jq -r --arg CONTEXT "$CONTEXT" \
            '.statuses[] | select(.context == $CONTEXT) | .description | match("for commit (.+)").captures[0].string')

          echo "Context Status: $CONTEXT_STATUS"
          echo "Approved SHA: $APPROVED_SHA"

          echo "context_status=$CONTEXT_STATUS" >> $GITHUB_ENV
          echo "approved_sha=$APPROVED_SHA" >> $GITHUB_ENV

          if [ "$CONTEXT_STATUS" != "success" ]; then
            echo "Approval Validation context status is not 'success'. Exiting."
            exit 1
          fi

      - name: Verify Latest Commit Matches Approved SHA
        id: verify_sha
        run: |
          PR_SHA=${{ env.pr_sha }}
          APPROVED_SHA=${{ env.approved_sha }}

          echo "Latest commit SHA: $PR_SHA"
          echo "Approved commit SHA: $APPROVED_SHA"

          if [ "$PR_SHA" != "$APPROVED_SHA" ]; then
            echo "Latest commit SHA ($PR_SHA) does not match approved SHA ($APPROVED_SHA). Exiting."
            exit 1
          fi
          echo "Latest commit matches the approved SHA. Proceeding with rebuild."

      - name: Trigger Rebuild
        run: |
          echo "Rebuilding approved PR..."
