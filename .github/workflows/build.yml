name: Build Specific Commit

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'The commit SHA to checkout and build'
        required: true

jobs:
  build_commit:
    runs-on: [self-hosted, linux]  # Specifies a self-hosted runner

    steps:
      # Step 1: Checkout the repository at SHA
      - name: Checkout the repository at SHA
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.sha }}

      # Step 2: Set up Gradle
      - name: Set up Gradle
        uses: gradle/wrapper-validation-action@v1

      # Step 3: Run the Gradle build
      - name: Build the project with Gradle
        run: |
          ./gradlew build
